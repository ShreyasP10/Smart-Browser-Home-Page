<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Smart Browser Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="A personalised cosmic space-themed start page with tools, AI hub, and multi-engine search.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Smart Home">
</head>
<body>
    <div class="cosmic-bg"></div>
    <div class="app-wrapper">
        <header class="header">
            <div class="logo">
                <i class="fas fa-home logo-icon"></i>
                <h1>Smart Browser Home</h1>
            </div>
            <div class="date-time" id="dateTime"></div>
        </header>

        <main class="main-content">
            <!-- Tools Section -->
            <section class="left-section" id="toolsSection">
                <div class="section-header">
                    <h2 class="section-title"><i class="fas fa-tools"></i> Tools</h2>
                    <span class="item-count" id="toolsCount">0 items</span>
                </div>
                <div class="tools-container" id="toolsContainer" data-type="tools"></div>
                <div class="empty-state" id="toolsEmptyState" style="display:none;">
                    <i class="fas fa-toolbox"></i>
                    <p>No tools yet. Click <strong>Add</strong> below.</p>
                </div>
            </section>

            <!-- Center Section (Search + Space visual) -->
            <section class="center-section">
                <div class="space-scene">
                    <div class="planet"></div>
                    <div class="moon"></div>
                    <div class="stars-layer"></div>
                </div>
                <div class="search-section floating-card">
                    <h3 class="search-title"><i class="fas fa-search"></i> Universal Search</h3>
                    <div class="search-container" id="searchContainer">
                        <div class="search-icon"><i class="fas fa-search"></i></div>
                        <input type="text" id="searchInput" class="search-input" placeholder="Search the web..." autocomplete="off">
                        <button type="button" id="clearSearchBtn" class="clear-btn" title="Clear (Esc)"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="search-engines">
                        <span class="engine-label">Engine:</span>
                        <button class="engine-btn active" data-engine="bing"><i class="fab fa-microsoft"></i> Bing</button>
                        <button class="engine-btn" data-engine="google"><i class="fab fa-google"></i> Google</button>
                        <button class="engine-btn" data-engine="duckduckgo"><i class="fas fa-duck"></i> DuckDuckGo</button>
                        <button class="engine-btn" data-engine="brave"><i class="fas fa-shield-alt"></i> Brave</button>
                    </div>
                    <div class="form-buttons">
                        <button type="button" id="searchBtn" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
                        <button type="button" id="luckyBtn" class="btn btn-secondary"><i class="fas fa-dice"></i> I'm Feeling Lucky</button>
                    </div>
                </div> 
            </section>

            <!-- AI Section -->
            <section class="right-section" id="aiSection">
                <div class="section-header">
                    <h2 class="section-title"><i class="fas fa-robot"></i> AI</h2>
                    <span class="item-count" id="aiCount">0 items</span>
                </div>
                <div class="ai-container" id="aiContainer" data-type="ai"></div>
                <div class="empty-state" id="aiEmptyState" style="display:none;">
                    <i class="fas fa-robot"></i>
                    <p>No AI tools yet. Click <strong>Add</strong> below.</p>
                </div>
            </section>
        </main>

        <!-- Floating Bottom Bar -->
        <footer class="bottom-bar">
            <button class="btn btn-add" id="addBtn" title="Add new shortcut (Ctrl+N)"><i class="fas fa-plus-circle"></i> <span class="btn-label">Add</span></button>
            <button class="btn btn-edit" id="editBtn" title="Rearrange items (Ctrl+E)"><i class="fas fa-arrows-alt"></i> <span class="btn-label">Edit</span></button>
            <button class="btn btn-save" id="saveBtn" title="Save layout (Ctrl+S)"><i class="fas fa-save"></i> <span class="btn-label">Save</span></button>
            <button class="btn btn-export" id="exportBtn" title="Export configuration"><i class="fas fa-download"></i> <span class="btn-label">Export</span></button>
            <button class="btn btn-import" id="importBtn" title="Import configuration"><i class="fas fa-upload"></i> <span class="btn-label">Import</span></button>
            <button class="btn btn-reset" id="resetBtn" title="Reset to defaults"><i class="fas fa-undo-alt"></i> <span class="btn-label">Reset</span></button>
        </footer>
    </div>

    <!-- Add Item Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-plus-circle"></i> Add New Shortcut</h2>
                <button class="modal-close" id="modalCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="modalCategory"><i class="fas fa-layer-group"></i> Category</label>
                    <select id="modalCategory" class="form-input">
                        <option value="tools">Tools & Dev</option>
                        <option value="ai">AI Hub</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="modalName"><i class="fas fa-tag"></i> Name <span class="required">*</span></label>
                    <input type="text" id="modalName" class="form-input" placeholder="e.g. GitHub, ChatGPT..." maxlength="50">
                </div>
                <div class="form-group">
                    <label for="modalUrl"><i class="fas fa-link"></i> URL <span class="required">*</span></label>
                    <input type="url" id="modalUrl" class="form-input" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label for="modalIcon"><i class="fas fa-icons"></i> FontAwesome Icon</label>
                    <input type="text" id="modalIcon" class="form-input" placeholder="e.g. fab fa-github" value="fas fa-link">
                    <small class="form-hint">Browse icons at <a href="https://fontawesome.com/icons" target="_blank">fontawesome.com</a></small>
                </div>
                <div class="form-group">
                    <label for="modalColor"><i class="fas fa-palette"></i> Color</label>
                    <div class="color-picker-row">
                        <input type="color" id="modalColor" class="form-color" value="#3b82f6">
                        <div class="color-presets" id="colorPresets">
                            <span class="color-dot" data-color="#3B82F6" style="background:#3B82F6;"></span>
                            <span class="color-dot" data-color="#8B5CF6" style="background:#8B5CF6;"></span>
                            <span class="color-dot" data-color="#10B981" style="background:#10B981;"></span>
                            <span class="color-dot" data-color="#F59E0B" style="background:#F59E0B;"></span>
                            <span class="color-dot" data-color="#EF4444" style="background:#EF4444;"></span>
                            <span class="color-dot" data-color="#EC4899" style="background:#EC4899;"></span>
                            <span class="color-dot" data-color="#6366F1" style="background:#6366F1;"></span>
                            <span class="color-dot" data-color="#14B8A6" style="background:#14B8A6;"></span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelModalBtn">Cancel</button>
                <button class="btn btn-primary" id="submitModalBtn"><i class="fas fa-plus"></i> Add Shortcut</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h2><i class="fas fa-trash-alt"></i> Confirm Delete</h2>
                <button class="modal-close" id="deleteModalCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <p>Delete <strong id="deleteItemName"></strong>?</p>
                <p class="text-warning">This cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn"><i class="fas fa-trash-alt"></i> Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Hidden file input for import -->
    <input type="file" id="importFileInput" accept=".json" style="display:none;">

    <script src="script.js"></script>
</body>
</html>
